# ══════════════════════════════════════════════════════════════════════════════
# FindRec Configuration for MicroVideo Baseline
# ══════════════════════════════════════════════════════════════════════════════

# ── Device & Seed ─────────────────────────────────────────────────────────────
device: "cuda"
seed: 2000

# ── Data Paths ────────────────────────────────────────────────────────────────
interaction_path: './interaction.parquet'
item_path: './item_used.parquet'
title_npy_path: './title_emb.npy'
save_path: './best_findrec.pt'

# ── Model Architecture ────────────────────────────────────────────────────────
id_embedding_dim: 300          # TedRec과 유사하게
num_attention_heads: 2         # TedRec과 동일
dropout_prob: 0.5              # TedRec과 동일

# ── Bottleneck ────────────────────────────────────────────────────────────────
bottleneck:
    dim: 256
    beta: 1.0
    weight: 0.1
    kernel_type: 'rbf'
    bandwidth_factor: 1.0
    adaptive_bandwidth: True
    min_bandwidth: 0.1
    max_bandwidth: 10.0

# ── Mamba ─────────────────────────────────────────────────────────────────────
mamba:
    d_state: 16
    d_conv: 4
    expand: 2
    norm_eps: 1e-5
    hidden_dim: 300            # id_embedding_dim과 동일
    num_layers: 2

# ── Multimodal ────────────────────────────────────────────────────────────────
multimodal:
    hidden_size: 256
    projection_dropout: 0.2
    fusion_dropout: 0.2

# ── Expert (MoE) ──────────────────────────────────────────────────────────────
expert:
    num_experts: 4

# ── Router ────────────────────────────────────────────────────────────────────
router:
    hidden_size: 256
    dropout: 0.1

# ── Image Features ────────────────────────────────────────────────────────────
image:
    feature_dim: null          # auto-detected from data (2048)
    projection_dim: 256

# ── Text Features ─────────────────────────────────────────────────────────────
text:
    feature_dim: null          # auto-detected from data (384)
    projection_dim: 256

# ── Data & Model Config ───────────────────────────────────────────────────────
# Auto-detected in main_fluid.py:
# - image.feature_dim (from data)
# - text.feature_dim (from data)

# ── Training ──────────────────────────────────────────────────────────────────
epochs: 100
batch_size: 128                # main_fluid.py expects 'batch_size'
num_workers: 0                 # Kaggle/Windows 호환
learning_rate: 0.001           # TedRec과 동일
weight_decay: 0.01
gradient_clip_norm: 5.0        # TedRec과 동일
eval_step: 10                  # 10 epoch마다 평가 (TedRec과 동일)
stopping_step: 3               # Early stopping (TedRec과 동일)
max_seq_len: 50                # TedRec과 동일

# ── Evaluation (베이스라인 조건) ──────────────────────────────────────────────
topk: 10                       # NDCG@10, HR@10, MRR
num_neg: 100                   # 101 candidates (1 positive + 100 negative)
